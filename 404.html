<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not Found — Emerald Publishing</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0f2a1e" />

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%230f2a1e'/%3E%3Ccircle cx='50' cy='50' r='18' fill='%23d4b068'/%3E%3C/svg%3E"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;500&display=swap"
      />
    </noscript>

    <link rel="stylesheet" href="css/vendor/bootstrap.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <main class="not-found">
      <div class="container">
        <div class="not-found-mark" aria-hidden="true">404</div>
        <div class="eyebrow">Lost the Thread</div>
        <h1 class="display not-found-heading">
          This page has <em>wandered off</em>.
        </h1>
        <p class="not-found-sub">
          The link you followed may be broken, or the page may have moved.
          Let's get you back to something steady.
        </p>
        <a href="/" class="btn btn-primary-custom">Return Home</a>
      </div>
    </main>
  </body>
</html>
